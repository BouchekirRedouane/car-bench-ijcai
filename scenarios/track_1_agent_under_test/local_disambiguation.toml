# Disambiguation-only scenario (Track 1). The weakest category for every
# leaderboard baseline (best: .46 Pass^3) — cheapest relative points available.
# Tests the ask-vs-resolve ladder: policy > explicit request > preferences >
# defaults > ask. Bump tasks_disambiguation_num_tasks (or -1 for all) as needed.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8090"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8090 --agent-llm openrouter/anthropic/claude-sonnet-4.6"

[config]
user_model = "openrouter/google/gemini-2.5-flash"
user_provider = "openrouter"
policy_evaluator_model = "openrouter/google/gemini-2.5-flash"
policy_evaluator_provider = "openrouter"
num_trials = 1
task_split = "train"
tasks_disambiguation_num_tasks = 5

max_steps = 50
