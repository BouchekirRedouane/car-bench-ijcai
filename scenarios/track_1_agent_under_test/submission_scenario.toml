[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"

[evaluator.env]
GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[agent_under_test]
image = "ghcr.io/bouchekirredouane/car-bench-track-1-agent-under-test@sha256:3490d224750d571d6dad9dbb5a0d45b773f54db1f3c31617f544e01d0dc758fe"

[agent_under_test.env]
# AgentGuardUtil runs litellm on Claude Opus 4.8 via OpenRouter:
# an OpenRouter API key (openrouter.ai) is expected.
AGENT_LLM = "${AGENT_LLM:-openrouter/anthropic/claude-opus-4.8}"
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY (used by AGENT_LLM=openrouter/anthropic/claude-opus-4.8)}"
# Claude Opus 4.8 rejects explicit sampling parameters -> leave temperature unset.
AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[config]
num_trials = 3
task_split = "hidden"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
