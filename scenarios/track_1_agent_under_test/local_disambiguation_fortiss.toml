# Disambiguation split with the STUDENT on fortiss public-Ollama (gpt-oss:120b).
#
# Verified 2026-07-13: server back up, 20 models incl. gpt-oss:120b (65GB) and
# qwen3.5:122b (81GB). Auth/token refresh handled by src/fortiss_ollama.py
# (installed at startup in both the agent and evaluator processes; tokens
# auto-refresh every ~59 min, so long runs are safe).
#
# EVERYTHING on fortiss/gpt-oss:120b: student, teacher (TEACHER_LLM in .env),
# user simulator, and policy judge. Total API cost: $0.
#
# Run:
#   uv run car-bench-run scenarios/track_1_agent_under_test/local_disambiguation_fortiss.toml --show-logs
#
# Notes:
#   * Requires MANUAL_LLM=0 and FORTISS_OLLAMA_API_KEY in .env.
#   * Shared production server -> latency varies; a full 31-task run may take
#     1-3 hours. Not accessible from the fortiss external WiFi.
#   * Observed in smoke test: gpt-oss:120b invented an enum value on its first
#     tool call — expect the harness schema gate to work hard on this model.
#   * Other candidates: fortiss/qwen3.5:122b, fortiss/llama3.3:latest,
#     fortiss/deepseek-r1:32b (swap the --agent-llm string).

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8090"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8090 --agent-llm fortiss/gpt-oss:120b"

[config]
user_model = "fortiss/gpt-oss:120b"
user_provider = "openai"
policy_evaluator_model = "fortiss/gpt-oss:120b"
policy_evaluator_provider = "openai"
num_trials = 1
task_split = "train"
tasks_disambiguation_task_id_filter = ["disambiguation_0", "disambiguation_14", "disambiguation_22"]

max_steps = 50
