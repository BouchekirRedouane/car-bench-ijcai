# Local smoke scenario for the baseline LiteLLM agent under test.
# Runs one train task from each CAR-bench task type.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8090"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8090 --agent-llm openrouter/google/gemini-2.5-flash"

[config]
user_model = "openrouter/google/gemini-2.5-flash"
user_provider = "openrouter"
policy_evaluator_model = "openrouter/google/gemini-2.5-flash"
policy_evaluator_provider = "openrouter"
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 1
tasks_hallucination_num_tasks = 1
tasks_disambiguation_num_tasks = 1
max_steps = 50
